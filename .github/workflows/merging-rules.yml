name: Merging Rules
on:
   # Run on pull requests into the #master branch
   pull_request:
      branches: [master]

jobs:
   unit-tests:
      name: Unit Tests
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v6
         - run: npm i
         - run: npm test

   e2e-tests:
      uses: ./.github/workflows/e2e-test.yml
      with:
         app_id: ${{ vars.GS_DEV_APP_ID }}
      secrets:
         app_secret: ${{ secrets.GS_DEV_APP_PK }}
